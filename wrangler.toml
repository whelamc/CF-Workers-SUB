name = "sub-worker"
main = "_worker.js"
compatibility_date = "2025-07-23"
keep_vars = true

# 线上部署使用 Cloudflare 控制台绑定 KV（变量名: KV）
# 不在 wrangler.toml 声明生产 kv_namespaces，避免要求填写 namespace id

[env.local]
name = "sub-worker-local"

[[env.local.kv_namespaces]]
binding = "KV" # 本地调试专用 KV 占位
id = "00000000000000000000000000000000"
preview_id = "11111111111111111111111111111111"
